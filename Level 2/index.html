<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020202">
<title>De Onthulling — Level 2</title>
<style>
:root{--gold:#d8b45f;--light:#f6dfa1;--black:#020202}*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Georgia,"Times New Roman",serif}
button{font:inherit}.app{position:fixed;inset:0;background:#000;overflow:hidden}.scenes{position:absolute;inset:0}
.scene{position:absolute;inset:-6%;opacity:0;background:center/cover no-repeat;filter:brightness(.72) contrast(1.08) saturate(1.06);transition:opacity 1.8s ease;will-change:transform,opacity}
.scene.active{opacity:1}.scene:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,transparent 28%,rgba(0,0,0,.22) 68%,rgba(0,0,0,.83) 100%),linear-gradient(to bottom,rgba(0,0,0,.06),rgba(0,0,0,.28))}
.pan-a{animation:panA 5.4s linear forwards}.pan-b{animation:panB 5.4s linear forwards}.pan-c{animation:panC 5.4s linear forwards}.pan-d{animation:panD 5.4s linear forwards}
@keyframes panA{from{transform:scale(1.08) translate(-1.3%,1%)}to{transform:scale(1.18) translate(1.3%,-1%)}}
@keyframes panB{from{transform:scale(1.18) translate(1.5%,0)}to{transform:scale(1.08) translate(-1%,0)}}
@keyframes panC{from{transform:scale(1.1) translate(0,1.6%)}to{transform:scale(1.2) translate(0,-1.6%)}}
@keyframes panD{from{transform:scale(1.2) translate(-1%,0)}to{transform:scale(1.09) translate(1%,0)}}
.vignette{position:absolute;inset:0;z-index:8;pointer-events:none;box-shadow:inset 0 0 170px rgba(0,0,0,.9)}
.grain{position:absolute;inset:-50%;z-index:9;opacity:.045;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain .2s steps(2) infinite}
@keyframes grain{0%{transform:translate(0)}25%{transform:translate(2%,-2%)}50%{transform:translate(-2%,2%)}75%{transform:translate(2%,2%)}100%{transform:translate(-2%,-2%)}}
.particles{position:absolute;inset:0;z-index:14;pointer-events:none}.particle{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--light);box-shadow:0 0 9px rgba(246,223,161,.75);opacity:0;animation:float var(--d) ease-in-out infinite var(--delay)}
@keyframes float{0%{opacity:0;transform:translate3d(0,25px,0) scale(.4)}25%{opacity:.75}75%{opacity:.3}100%{opacity:0;transform:translate3d(var(--x),-100px,0) scale(1.2)}}
.screen{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;text-align:center;background:#000}.start{padding:2rem;background:radial-gradient(circle at 50% 40%,rgba(216,180,95,.09),transparent 34%),#020202}.eyebrow{color:var(--gold);letter-spacing:.42em;font:700 .73rem Arial,sans-serif}.title{margin:.22em 0 .72em;color:var(--light);font-weight:400;letter-spacing:.16em;font-size:clamp(2.2rem,7vw,5.4rem);text-shadow:0 0 28px rgba(216,180,95,.16)}
.start button{padding:1rem 1.8rem;border:1px solid rgba(216,180,95,.8);border-radius:999px;background:transparent;color:var(--light);letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:.3s}.start button:hover{background:rgba(216,180,95,.1);box-shadow:0 0 35px rgba(216,180,95,.15)}.hint{margin-top:1rem;color:rgba(255,255,255,.46);font: .78rem Arial,sans-serif}
.intro,.outro{opacity:0;pointer-events:none}.intro.show{animation:introLife 9s linear forwards}@keyframes introLife{0%,7%{opacity:1}82%{opacity:1}100%{opacity:0}}
.line{opacity:0;color:var(--light);font-size:clamp(1.25rem,4vw,2.7rem);letter-spacing:.1em;margin:.5em;text-shadow:0 0 24px rgba(216,180,95,.18)}.intro.show .one{animation:lineIn 3s ease 1.3s forwards}.intro.show .two{animation:lineIn 3s ease 4.5s forwards}
@keyframes lineIn{0%{opacity:0;filter:blur(6px);transform:translateY(10px)}35%,70%{opacity:1;filter:blur(0);transform:none}100%{opacity:0;filter:blur(4px);transform:translateY(-8px)}}
.dh{position:absolute;z-index:19;color:var(--light);font-style:italic;letter-spacing:-.18em;text-shadow:0 0 28px rgba(216,180,95,.55);opacity:0;pointer-events:none}.dh-intro{left:8%;bottom:10%;font-size:clamp(3rem,8vw,7rem);transform:rotate(-8deg)}.dh-hidden{right:11%;bottom:18%;font-size:clamp(2rem,5vw,4.4rem);mix-blend-mode:screen}.dh-intro.show{animation:dhIntro 2.8s ease .4s forwards}.dh-hidden.show{animation:dhHidden 1.5s ease forwards}
@keyframes dhIntro{0%{opacity:0;filter:blur(9px);transform:rotate(-8deg) scale(.85)}45%{opacity:.72;filter:blur(0)}100%{opacity:0;transform:rotate(-8deg) scale(1.05)}}@keyframes dhHidden{0%,100%{opacity:0}45%,62%{opacity:.22}}
.flare{position:absolute;inset:-30%;z-index:20;pointer-events:none;opacity:0;background:radial-gradient(circle at center,rgba(255,240,196,.95) 0,rgba(216,180,95,.55) 8%,rgba(216,180,95,.13) 23%,transparent 48%)}.flare.flash{animation:flare 1.3s ease}@keyframes flare{0%{opacity:0;transform:scale(.6)}40%{opacity:1}100%{opacity:0;transform:scale(1.5)}}
.outro.show{animation:out 3s ease forwards}@keyframes out{to{opacity:1}}.complete{color:var(--light);letter-spacing:.36em;font-size:clamp(1.6rem,6vw,4rem);font-weight:400}.brand{color:rgba(216,180,95,.72);letter-spacing:.21em;margin-top:1rem}.again{margin-top:2.2rem;border:0;background:none;color:rgba(255,255,255,.34);letter-spacing:.14em;font-size:.72rem;cursor:pointer}
@media(max-width:700px){.scene{inset:-10%}.vignette{box-shadow:inset 0 0 90px rgba(0,0,0,.9)}}
</style>
</head>
<body>
<div class="app">
  <div class="scenes" id="scenes"></div><div class="particles" id="particles"></div><div class="flare" id="flare"></div>
  <div class="dh dh-intro" id="dhIntro">DH</div><div class="dh dh-hidden" id="dhHidden">DH</div><div class="vignette"></div><div class="grain"></div>
  <div class="screen intro" id="intro"><div><div class="line one">Sommige steden...</div><div class="line two">vertellen een verhaal...</div></div></div>
  <div class="screen start" id="start"><div><div class="eyebrow">DE ONTHULLING</div><h1 class="title">LEVEL 2</h1><button id="play" type="button">Start de ervaring</button><div class="hint">Zet je geluid aan</div></div></div>
  <div class="screen outro" id="outro"><div><div class="complete">VOLTOOID</div><div class="brand">DE ONTHULLING</div><button class="again" id="again" type="button">OPNIEUW BEKIJKEN</button></div></div>
  <audio id="audio" preload="auto" src="rotterdam-level-2.m4a"></audio>
</div>
<script>
(()=>{const files=["scene-1.jpg","scene-2.jpg","scene-3.jpg","scene-4.jpg","scene-5.jpg","scene-6.jpg","scene-7.jpg","scene-8.jpg"],dur=4800,moves=["pan-a","pan-b","pan-c","pan-d"],wrap=document.getElementById("scenes"),els=[],timers=[];
files.forEach((f,i)=>{const d=document.createElement("div");d.className="scene";d.style.backgroundImage=`url('${f}')`;wrap.appendChild(d);els.push(d)});
const particles=document.getElementById("particles");for(let i=0;i<42;i++){const p=document.createElement("span");p.className="particle";p.style.left=Math.random()*100+"%";p.style.top=25+Math.random()*75+"%";p.style.setProperty("--d",5+Math.random()*6+"s");p.style.setProperty("--delay",-Math.random()*8+"s");p.style.setProperty("--x",-35+Math.random()*70+"px");particles.appendChild(p)}
const later=(fn,ms)=>timers.push(setTimeout(fn,ms)),clear=()=>{while(timers.length)clearTimeout(timers.pop())},intro=document.getElementById("intro"),start=document.getElementById("start"),outro=document.getElementById("outro"),audio=document.getElementById("audio"),flare=document.getElementById("flare"),dhIntro=document.getElementById("dhIntro"),dhHidden=document.getElementById("dhHidden");
function show(i){els.forEach(e=>e.className="scene");const e=els[i];void e.offsetWidth;e.classList.add("active",moves[i%moves.length]);if(i===1||i===4){flare.classList.remove("flash");void flare.offsetWidth;flare.classList.add("flash")}if(i===5){dhHidden.classList.remove("show");void dhHidden.offsetWidth;dhHidden.classList.add("show")}}
async function play(){clear();els.forEach(e=>e.className="scene");outro.classList.remove("show");intro.classList.remove("show");dhIntro.classList.remove("show");start.style.display="none";audio.pause();audio.currentTime=0;intro.classList.add("show");dhIntro.classList.add("show");try{await audio.play()}catch(e){}let t=8500;files.forEach((_,i)=>{later(()=>show(i),t);t+=dur});later(()=>els.forEach(e=>e.className="scene"),t-500);later(()=>outro.classList.add("show"),t+600)}
document.getElementById("play").addEventListener("click",play);document.getElementById("again").addEventListener("click",play)})();
</script>
</body>
</html>
