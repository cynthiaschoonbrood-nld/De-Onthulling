<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>De Onthulling — Fragment 01</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="experience" aria-live="polite">
    <div class="ambient" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <section id="start-screen" class="screen is-visible">
      <div class="brand-block">
        <div class="gold-line"></div>
        <p class="eyebrow">EXCLUSIEVE TOEGANG</p>
        <h1>DE ONTHULLING</h1>
        <p class="fragment-label">FRAGMENT 01</p>
      </div>
      <button id="start-button" class="primary-button" type="button">OPEN FRAGMENT</button>
      <p class="sound-note">Geluid wordt gebruikt voor deze onthulling</p>
    </section>

    <section id="protocol-screen" class="screen">
      <div class="protocol-panel">
        <p class="eyebrow">THE REVEAL PROTOCOL</p>
        <div id="protocol-log" class="protocol-log"></div>
        <div class="progress-shell" aria-hidden="true"><div id="progress-bar" class="progress-bar"></div></div>
      </div>
    </section>

    <section id="countdown-screen" class="screen">
      <p class="eyebrow">FRAGMENT WORDT VRIJGEGEVEN</p>
      <div id="countdown" class="countdown">3</div>
    </section>

    <section id="audio-screen" class="screen">
      <p class="eyebrow">FRAGMENT 01</p>
      <h2>Luister.</h2>
      <div class="wave" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <p class="audio-status">Audiofragment wordt afgespeeld</p>
      <button id="replay-button" class="text-button" type="button">Opnieuw afspelen</button>
    </section>

    <section id="complete-screen" class="screen">
      <div class="completion-mark">✓</div>
      <p class="eyebrow">FRAGMENT VOLTOOID</p>
      <h2>Voortgang opgeslagen.</h2>
      <p class="closing-copy">De volgende onthulling wacht op het juiste moment.</p>
      <button id="restart-button" class="text-button" type="button">Fragment opnieuw beleven</button>
    </section>

    <div class="hidden-signature" aria-hidden="true">DH</div>

    <audio id="crowd-audio" preload="auto">
      <source src="assets/fragment-01-applaus.mp3" type="audio/mpeg">
      <source src="assets/fragment-01-applaus.ogg" type="audio/ogg">
    </audio>
  </main>
  <script src="script.js"></script>
</body>
</html>
