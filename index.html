<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050507" />
  <title>De Onthulling — Level 2</title>
  <link rel="preload" href="assets/audio/rotterdam.m4a" as="audio" type="audio/mp4" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app" aria-live="polite">
    <section id="loader" class="scene active">
      <div class="loader-card">
        <div class="eyebrow">DE ONTHULLING</div>
        <h1>LEVEL 2</h1>
        <div class="progress-shell" aria-label="Laden">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressText" class="progress-text">0%</div>
        <button id="startButton" class="start-button" type="button" disabled>START ONTHULLING</button>
        <p class="sound-note">Geluid aan aanbevolen</p>
      </div>
    </section>

    <section id="countdown" class="scene countdown-scene" aria-hidden="true">
      <div id="countNumber" class="count-number"></div>
      <div id="boomText" class="boom-text">BOOM</div>
    </section>

    <section id="rotterdam" class="scene rotterdam-scene" aria-hidden="true">
      <div id="slides" class="slides"></div>
      <div class="cinema-vignette"></div>
      <div class="film-grain"></div>
    </section>

    <section id="blackout" class="scene blackout" aria-hidden="true"></section>

    <section id="finale" class="scene finale" aria-hidden="true">
      <canvas id="fireworks" aria-hidden="true"></canvas>
      <div class="final-glow"></div>
      <h2 id="finalText">WEES VOORBEREID OP LEVEL 3</h2>
    </section>
  </main>

  <audio id="music" preload="auto" playsinline>
    <source src="assets/audio/rotterdam.m4a" type="audio/mp4" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
