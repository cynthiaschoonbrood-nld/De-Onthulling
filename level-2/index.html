<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#050505"><title>De Onthulling — Level 2</title><style>
:root{--gold:#d7af57;--gold2:#f3d58b}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Georgia,"Times New Roman",serif}button{font:inherit}#app{position:fixed;inset:0;background:#000;overflow:hidden}.scene{position:absolute;inset:-4%;opacity:0;background-position:center;background-size:cover;transform:scale(1.08);filter:saturate(1.02) contrast(1.04) brightness(.78);transition:opacity 2.2s ease;will-change:transform,opacity}.scene.active{opacity:1}.scene:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,transparent 35%,rgba(0,0,0,.25) 72%,rgba(0,0,0,.72) 100%),linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.24))}.move-a{animation:moveA 7s linear forwards}.move-b{animation:moveB 7s linear forwards}.move-c{animation:moveC 7s linear forwards}.move-d{animation:moveD 7s linear forwards}@keyframes moveA{from{transform:scale(1.10) translate3d(-1.5%,1%,0)}to{transform:scale(1.20) translate3d(1.5%,-1%,0)}}@keyframes moveB{from{transform:scale(1.18) translate3d(2%,0,0)}to{transform:scale(1.08) translate3d(-1%,0,0)}}@keyframes moveC{from{transform:scale(1.10) translate3d(0,2%,0)}to{transform:scale(1.19) translate3d(0,-2%,0)}}@keyframes moveD{from{transform:scale(1.20) translate3d(-1%,0,0)}to{transform:scale(1.10) translate3d(1%,0,0)}}#vignette{position:absolute;inset:0;pointer-events:none;z-index:8;box-shadow:inset 0 0 180px rgba(0,0,0,.88)}#grain{position:absolute;inset:-60%;z-index:9;opacity:.065;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.65'/%3E%3C/svg%3E");animation:grain .18s steps(2) infinite}@keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(2%,-3%)}50%{transform:translate(-3%,2%)}75%{transform:translate(3%,3%)}100%{transform:translate(-2%,-2%)}}#particles{position:absolute;inset:0;z-index:15;pointer-events:none}.particle{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--gold2);box-shadow:0 0 9px rgba(243,213,139,.8);opacity:0;animation:float var(--d) ease-in-out infinite var(--delay)}@keyframes float{0%{opacity:0;transform:translate3d(0,22px,0) scale(.5)}25%{opacity:.75}70%{opacity:.35}100%{opacity:0;transform:translate3d(var(--x),-90px,0) scale(1.2)}}#intro,#outro,#startScreen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;background:#000}#intro{opacity:0;pointer-events:none}#intro.show{animation:introLife 10s linear forwards}@keyframes introLife{0%,5%{opacity:1}82%{opacity:1}100%{opacity:0}}.introText{text-align:center;letter-spacing:.12em;color:var(--gold2);text-shadow:0 0 25px rgba(215,175,87,.2)}.introText .line{opacity:0;font-size:clamp(1.35rem,3vw,2.6rem);margin:.35em 0}#intro.show .line1{animation:lineIn 3.4s ease 2.1s forwards}#intro.show .line2{animation:lineIn 3.4s ease 5.4s forwards}@keyframes lineIn{0%{opacity:0;transform:translateY(10px);filter:blur(5px)}30%,70%{opacity:1;transform:none;filter:blur(0)}100%{opacity:0;transform:translateY(-6px);filter:blur(4px)}}.dh{position:absolute;z-index:18;color:var(--gold2);font-size:clamp(3rem,8vw,7rem);font-style:italic;letter-spacing:-.18em;text-shadow:0 0 28px rgba(215,175,87,.45);opacity:0;pointer-events:none}#dhIntro{left:8%;bottom:10%;transform:rotate(-8deg)}#dhHidden{right:11%;bottom:17%;font-size:clamp(2rem,5vw,4.5rem);mix-blend-mode:screen}#dhIntro.reveal{animation:dhReveal 2.8s ease .4s forwards}#dhHidden.reveal{animation:dhHidden 1.6s ease forwards}@keyframes dhReveal{0%{opacity:0;filter:blur(9px);transform:rotate(-8deg) scale(.85)}45%{opacity:.72;filter:blur(0)}100%{opacity:0;transform:rotate(-8deg) scale(1.05)}}@keyframes dhHidden{0%,100%{opacity:0}45%,60%{opacity:.24}}#flare{position:absolute;inset:-30%;z-index:20;pointer-events:none;opacity:0;background:radial-gradient(circle at 50% 50%,rgba(255,236,181,.95) 0,rgba(215,175,87,.58) 8%,rgba(215,175,87,.14) 22%,transparent 48%)}#flare.flash{animation:flare 1.5s ease}@keyframes flare{0%{opacity:0;transform:scale(.6)}40%{opacity:1}100%{opacity:0;transform:scale(1.5)}}#startScreen{background:radial-gradient(circle at 50% 42%,rgba(215,175,87,.08),transparent 34%),#020202;text-align:center;padding:2rem}.start-inner{max-width:680px}.eyebrow{color:var(--gold);letter-spacing:.42em;font-size:.72rem;margin-bottom:1.2rem}h1{font-weight:400;letter-spacing:.16em;color:#f4e1ad;margin:.2rem 0 1.8rem;font-size:clamp(2rem,6vw,4.8rem)}#start{border:1px solid rgba(215,175,87,.75);background:transparent;color:#f4e1ad;padding:1rem 2rem;letter-spacing:.24em;text-transform:uppercase;cursor:pointer;transition:.35s;border-radius:999px}#start:hover{background:rgba(215,175,87,.12);box-shadow:0 0 35px rgba(215,175,87,.15)}.hint{margin-top:1rem;color:rgba(255,255,255,.45);font-family:Arial,sans-serif;font-size:.78rem}#outro{opacity:0;pointer-events:none;background:#000;text-align:center}#outro.show{animation:outroIn 3.5s ease forwards;pointer-events:auto}@keyframes outroIn{to{opacity:1}}.complete{color:var(--gold2);letter-spacing:.38em;font-size:clamp(1.7rem,5vw,4rem);font-weight:400;margin:0}.brand{color:rgba(215,175,87,.72);letter-spacing:.2em;margin-top:1rem;font-size:clamp(.8rem,1.6vw,1rem)}.restart{margin-top:2.2rem;border:0;background:none;color:rgba(255,255,255,.35);cursor:pointer;letter-spacing:.14em;font-size:.75rem}@media(max-width:700px){#vignette{box-shadow:inset 0 0 90px rgba(0,0,0,.88)}.scene{inset:-8%}}
</style></head><body><div id="app"><div id="scenes"></div><div id="particles"></div><div id="flare"></div><div id="dhIntro" class="dh">DH</div><div id="dhHidden" class="dh">DH</div><div id="vignette"></div><div id="grain"></div><div id="intro"><div class="introText"><div class="line line1">Sommige steden...</div><div class="line line2">vertellen een verhaal...</div></div></div><div id="startScreen"><div class="start-inner"><div class="eyebrow">DE ONTHULLING</div><h1>LEVEL 2</h1><button id="start" type="button">Start de ervaring</button><div class="hint">Zet je geluid aan</div></div></div><div id="outro"><div><h2 class="complete">VOLTOOID</h2><div class="brand">DE ONTHULLING</div><button class="restart" id="restart" type="button">OPNIEUW BEKIJKEN</button></div></div><audio id="audio" preload="auto" src="assets/rotterdam-level-2.m4a"></audio></div><script>
(()=>{const sceneFiles=Array.from({length:8},(_,i)=>`assets/scene-${i+1}.jpg`),sceneDurations=[5,4.7,4.8,4.9,4.7,4.7,5,5.2],moveClasses=["move-a","move-b","move-c","move-d"],scenesWrap=document.getElementById("scenes"),audio=document.getElementById("audio"),intro=document.getElementById("intro"),startScreen=document.getElementById("startScreen"),outro=document.getElementById("outro"),flare=document.getElementById("flare"),dhIntro=document.getElementById("dhIntro"),dhHidden=document.getElementById("dhHidden"),timers=[];let sceneEls=[];sceneFiles.forEach((src,i)=>{const d=document.createElement("div");d.className="scene";d.style.backgroundImage=`url("${src}")`;scenesWrap.appendChild(d);sceneEls.push(d)});const particles=document.getElementById("particles");for(let i=0;i<42;i++){const p=document.createElement("span");p.className="particle";p.style.left=Math.random()*100+"%";p.style.top=25+Math.random()*75+"%";p.style.setProperty("--d",5+Math.random()*6+"s");p.style.setProperty("--delay",-Math.random()*8+"s");p.style.setProperty("--x",-35+Math.random()*70+"px");particles.appendChild(p)}const later=(fn,ms)=>timers.push(setTimeout(fn,ms)),clearTimers=()=>{while(timers.length)clearTimeout(timers.pop())};function showScene(index){sceneEls.forEach(el=>el.classList.remove("active",...moveClasses));const el=sceneEls[index];void el.offsetWidth;el.classList.add("active",moveClasses[index%moveClasses.length]);if(index===1||index===4){flare.classList.remove("flash");void flare.offsetWidth;flare.classList.add("flash")}if(index===5){dhHidden.classList.remove("reveal");void dhHidden.offsetWidth;dhHidden.classList.add("reveal")}}async function play(){clearTimers();sceneEls.forEach(el=>el.classList.remove("active",...moveClasses));outro.classList.remove("show");intro.classList.remove("show");dhIntro.classList.remove("reveal");startScreen.style.display="none";audio.pause();audio.currentTime=0;intro.classList.add("show");dhIntro.classList.add("reveal");try{await audio.play()}catch(e){}let t=9200;later(()=>showScene(0),t);sceneDurations.forEach((dur,i)=>{if(i>0)later(()=>showScene(i),t);t+=dur*1000});later(()=>{sceneEls.forEach(el=>el.classList.remove("active"))},t-600);later(()=>outro.classList.add("show"),t+800)}document.getElementById("start").addEventListener("click",play);document.getElementById("restart").addEventListener("click",play)})();
</script></body></html>
